name: Rocq build

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build with Rocq 9
        run: |
          set -eux
          docker run --rm \
            -v "$PWD:/src:ro" \
            rocq/rocq-prover:9.0.1 \
            sh -lc 'cp -a /src /tmp/work && cd /tmp/work && rocq makefile -f _CoqProject -o Makefile && make'
