name: Rocq build

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build with Rocq 9
        uses: coq-community/docker-coq-action@v1
        with:
          custom_image: 'rocq/rocq-prover:9.0.1'
          custom_script: |
            set -eux
            rocq makefile -f _CoqProject -o Makefile
            make
